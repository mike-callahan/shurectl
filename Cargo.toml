[package]
name = "shurectl"
version = "0.1.0"
edition = "2024"
description = "shurectl — TUI configurator for the Shure MVX2U audio interface on Linux"

[[bin]]
name = "shurectl"
path = "src/main.rs"

[dependencies]
ratatui = "0.26"
crossterm = "0.27"
hidapi = { version = "2.4.1", default-features = false, features = ["linux-native"] }
anyhow = "1.0"
clap = { version = "4.4.18", features = ["derive"] }
cpal = "0.15"
libc = "0.2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true
